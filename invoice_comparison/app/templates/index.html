<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Comparison</title>
</head>
<body>
    <h1>Upload and Compare Invoices</h1>
    <form action="/compare_invoices" method="post" enctype="multipart/form-data">
        <label for="invoice1">Invoice 1:</label>
        <input type="file" id="invoice1" name="invoice1" required>
        <br>
        <label for="invoice2">Invoice 2:</label>
        <input type="file" id="invoice2" name="invoice2" required>
        <br>
        <button type="submit">Compare Invoices</button>
    </form>
</body>
</html>
